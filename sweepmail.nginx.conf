upstream sweepmail {
    server unix:/run/sweepmail/sweepmail.sock fail_timeout=0;
}

server {
    listen 80;
    server_name sweepmail.appfoundry.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sweepmail.appfoundry.cc;

    ssl_certificate     /etc/letsencrypt/live/sweepmail.appfoundry.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweepmail.appfoundry.cc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 1M;

    location / {
        proxy_pass http://sweepmail;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Longer timeouts for Gmail API scanning
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /static/ {
        alias /var/www/sweepmail/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
